$kind: http-request
name: Update user with invalid email
url: "{{URL_Base}}/usuarios/{{idClient}}"
method: PUT
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: "{\r

    \  \"nome\": \"Invalid email\",\r

    \  \"email\": \"email@c\",\r

    \  \"password\": \"teste\",\r

    \  \"administrador\": \"false\"\r

    }"
auth:
  credentials:
    - key: token
      value: "{{auth}}"
  type: bearer
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code\", function () {\r

      \    pm.response.to.have.status(400);\r

      });\r

      \r

      pm.test(\"Invalid email\", function () {\r

      \    pm.expect(pm.response.json().email).to.eql(\"email deve ser um email
      válido\");\r

      });"
    language: text/javascript
