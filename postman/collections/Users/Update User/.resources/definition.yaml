name: Update User
description: >-
  # **Cenarios de teste da alteração dos dados de usuarios**


  #### **Update a user**


  Dado que eu tenha permissão de cadastro de usuario  

  E tenha autenticacao valida  

  E tenha um usuario cadastrado  

  Quando executo a requisição do PUT /usuarios/{{_id}} com os dados corretos  

  Entao devo receber a mensagem no response body que o registro foi alterado com
  sucesso  

  E status code deve ser igual a 200


  #### **Update a duplicate user**


  Dado que eu tenha permissão de cadastro de usuario  

  E tenha autenticacao valida  

  E tenha um usuario cadastrado  

  Quando executo a requisição do PUT /usuarios/{{_id}} com email duplicado/já
  existente no sistema  

  Entao devo receber a mensagem no response body que o email já está sendo
  usado  

  E status code deve ser igual a 400


  #### **Update a user with invalid email**


  Dado que eu tenha permissão de cadastro de usuario  

  E tenha autenticacao valida  

  E tenha um usuario cadastrado  

  Quando executo a requisição do PUT /usuarios/{{_id}} com email invalido  

  Entao devo receber a mensagem no response body que o email deve ser um email
  válido  

  E status code deve ser igual a 400


  #### **Update** a user with admin invalid


  Dado que eu tenha permissão de cadastro de usuario  

  E tenha autenticacao valida  

  E tenha um usuario cadastrado  

  Quando executo a requisição do PUT /usuarios/{{_id}} com email invalido  

  Entao devo receber a mensagem no response body que o campo administrador deve
  ser 'true' ou 'false'  

  E status code deve ser igual a 400


  #### **Update a user without required fields**


  Dado que eu tenha permissão de cadastro de usuario  

  E tenha autenticacao valida  

  E tenha um usuario cadastrado  

  Quando executo a requisição do PUT /usuarios/{{_id}} com email invalido  

  Entao devo receber a mensagem no response body que os campos são
  obrigatórios  

  E status code deve ser igual a 400
