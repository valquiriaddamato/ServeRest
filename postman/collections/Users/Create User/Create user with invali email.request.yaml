$kind: http-request
name: Create user with invali email
url: "{{URL_Base}}/usuarios"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: "{\r

    \  \"nome\": \"{{name}}\",\r

    \  \"email\": \"email@c\",\r

    \  \"password\": \"{{password}}\",\r

    \  \"administrador\": \"{{admin}}\"\r

    }"
auth:
  credentials:
    token: "{{auth}}"
  type: bearer
scripts:
  - type: beforeRequest
    code: "var dynamicFirstName =
      pm.variables.replaceIn(\"{{$randomFirstName}}\");\r

      pm.environment.set(\"name\", dynamicFirstName);\r

      \r

      var dynamicPassword = pm.variables.replaceIn(\"{{$randomPassword}}\");\r

      pm.environment.set(\"password\", dynamicPassword);\r

      \r

      var dynamicAdmin = pm.variables.replaceIn(\"{{$randomBoolean}}\");\r

      pm.environment.set(\"admin\", dynamicAdmin);"
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"Status code\", function () {\r

      \    pm.response.to.have.status(400);\r

      });\r

      \r

      pm.test(\"Invalid email\", function () {\r

      \    pm.expect(pm.response.json().email).to.eql(\"email deve ser um email
      válido\");\r

      });"
    language: text/javascript
order: 4488501317160260
