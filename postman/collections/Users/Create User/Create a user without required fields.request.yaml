$kind: http-request
name: Create a user without required fields
url: "{{URL_Base}}/usuarios"
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: "{}"
auth:
  credentials:
    - key: token
      value: "{{auth}}"
  type: bearer
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code\", function () {\r

      \    pm.response.to.have.status(400);\r

      });\r

      \r

      pm.test(\"Validate required fields\", function () {\r

      \    pm.expect(pm.response.json().nome).to.exist;\r

      \    pm.expect(pm.response.json().email).to.exist;\r

      \    pm.expect(pm.response.json().password).to.exist;\r

      \    pm.expect(pm.response.json().administrador).to.exist;\r

      });"
    language: text/javascript
order: 9000
