$kind: http-request
name: Create a new user
url: "{{URL_Base}}/usuarios"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: "{\r

    \  \"nome\": \"{{name}}\",\r

    \  \"email\": \"{{email}}\",\r

    \  \"password\": \"{{password}}\",\r

    \  \"administrador\": \"{{admin}}\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{auth}}"
scripts:
  - type: beforeRequest
    code: "var dynamicFirstName =
      pm.variables.replaceIn(\"{{$randomFirstName}}\");\r

      pm.environment.set(\"name\", dynamicFirstName);\r

      \r

      var dynamicEmail = pm.variables.replaceIn(\"{{$randomEmail}}\");\r

      pm.environment.set(\"email\", dynamicEmail);\r

      \r

      var dynamicPassword = pm.variables.replaceIn(\"{{$randomPassword}}\");\r

      pm.environment.set(\"password\", dynamicPassword);\r

      \r

      var dynamicAdmin = pm.variables.replaceIn(\"{{$randomBoolean}}\");\r

      pm.environment.set(\"admin\", dynamicAdmin);"
    language: text/javascript
  - type: afterResponse
    code: "pm.environment.set(\"idClient\", pm.response.json()._id);\r

      \r

      pm.test(\"Status code\", function () {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      pm.test(\"User created\", function () {\r

      \    pm.expect(pm.response.json().message).to.eql(\"Cadastro realizado com
      sucesso\");\r

      });"
    language: text/javascript
