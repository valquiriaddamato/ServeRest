$kind: http-request
name: Create a user for login
url: "{{URL_Base}}/usuarios"
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: "{\r

    \  \"nome\": \"Val\",\r

    \  \"email\": \"val@teste.com\",\r

    \  \"password\": \"teste2026\",\r

    \  \"administrador\": \"true\"\r

    }"
auth:
  credentials:
    - key: token
      value: "{{auth}}"
  type: bearer
order: 303
